<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro — RAZER</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>
  <div class="container-logo">
    <i class="fa-solid fa-computer"></i>
    <h1 class="logo">RAZER</h1>
  </div>
</header>

<section class="form-container">
  <h2>Registro</h2>

  <form id="register-form">
    <input id="reg-nombre" type="text" placeholder="Nombre de usuario" required>
    <input id="reg-email"  type="email" placeholder="Correo electrónico" required>

    <!-- Contraseña con toggle -->
    <div class="input-password-wrapper">
      <input id="reg-password" type="password" placeholder="Contraseña" required>
      <button type="button" class="toggle-password" data-target="reg-password">
        <svg class="icon-eye-off">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <svg class="icon-eye" style="display:none;">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <!-- Confirmar contraseña con toggle -->
    <div class="input-password-wrapper">
      <input id="reg-confirm" type="password" placeholder="Confirmar contraseña" required>
      <button type="button" class="toggle-password" data-target="reg-confirm">
        <svg class="icon-eye-off">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <svg class="icon-eye" style="display:none;">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button type="submit">Registrarse</button>
    <p id="reg-error" style="color:red;font-size:.85rem;display:none;margin-top:.5rem;"></p>
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
  </form>
</section>

<div id="footer-container"></div>
<script src="footer/footer.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/92b8cfdb2b.js" crossorigin="anonymous"></script>

<script src="carrito-frontend.js"></script>
<script src="login-frontend.js"></script>

<script>
document.querySelectorAll(".toggle-password").forEach(btn => {
  btn.addEventListener("click", () => {
    const input   = document.getElementById(btn.dataset.target);
    const eyeOff  = btn.querySelector(".icon-eye-off");
    const eyeOn   = btn.querySelector(".icon-eye");
    if (input.type === "password") {
      input.type = "text";
      eyeOff.style.display = "none";
      eyeOn.style.display  = "block";
    } else {
      input.type = "password";
      eyeOff.style.display = "block";
      eyeOn.style.display  = "none";
    }
  });
});
</script>

</body>
</html>

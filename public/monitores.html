<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitores — RAZER</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header>
<div class="container hero">
  <div class="container-logo">
    <i class="fa-solid fa-computer"></i>
    <h1 class="logo">RAZER</h1>
  </div>
  <div class="container-user">
    <a href="login.html" id="user-link"><i class="fa-solid fa-user"></i></a>
    <div class="cart-icon">
      <i class="fa-solid fa-cart-shopping"></i>
      <span id="cart-count">0</span>
    </div>
  </div>
</div>
<div class="container-navbar">
  <nav class="navbar container">
    <i class="fa-solid fa-bars"></i>
    <ul class="menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="monitores.html">Monitores</a></li>
      <li><a href="laptops.html">Laptops</a></li>
      <li><a href="componentes.html">Componentes</a></li>
    </ul>
  </nav>
</div>
</header>

<br><br><br>

<!-- PRODUCTOS -->
<section class="container top-products">
  <div class="container-h1"><h1>Monitores</h1></div>
  <div class="container-products" id="productos-container">
    <p style="text-align:center;color:#aaa;padding:2rem;">Cargando productos...</p>
  </div>
</section>

<br><br><br>


<!-- PANEL CARRITO -->
<div id="cart-panel" class="cart-panel">
  <div class="cart-header">
    <h2>Tu carrito</h2>
    <span id="close-cart">✖</span>
  </div>
  <div id="cart-items" class="cart-items"></div>
  <div class="cart-footer">
    <h3>Total: <span id="cart-total">$0</span></h3>
    <button id="buy-cart">Comprar</button>
    <button id="clear-cart">Vaciar carrito</button>
  </div>
</div>

<div id="footer-container"></div>
<script src="footer/footer.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/92b8cfdb2b.js" crossorigin="anonymous"></script>
<script src="carrito-frontend.js"></script>

<script>
// Menú hamburguesa
document.addEventListener("DOMContentLoaded", function () {
  document.querySelector(".fa-bars").addEventListener("click", function () {
    document.querySelector(".menu").classList.toggle("active");
  });
});

// Leer más / menos (delegado, funciona con cards dinámicas)
document.addEventListener("click", function (e) {
  const btn = e.target.closest(".btn-read-more");
  if (!btn) return;
  const card = btn.closest(".card-product");
  const expanded = card.classList.contains("expanded");
  document.querySelectorAll(".card-product").forEach(p => {
    p.classList.remove("expanded");
    const b = p.querySelector(".btn-read-more");
    if (b) b.textContent = "Leer más";
  });
  if (!expanded) {
    card.classList.add("expanded");
    btn.textContent = "Leer menos";
  }
});

// Mapeo manual de imágenes por id_producto
const imagenesMonitores = {
  19: "img/monitores/Monitor Arkham 25 Gamer 210hz Ips Fhd 1ms Hdmi Gris 2 (2).png",
  20: "img/monitores/Monitor Gamer 24 Asus Tuf Gaming Full Hd 180hz 1ms Vg249ql3a Color Negro (2).png",
  21: "img/monitores/Monitor Gamer 34 Curvo Altura Regulable 1440p 165hz G-sync Negro (2).png",
  22: "img/monitores/Monitor Gamer Msi Mag 255f E20 25 Pulgadas Full Hd 200hz Color Negro (2).png",
  23: "img/monitores/Monitor Gamer Viewsonic 24 Vx2429 Fhd 200hz Color Negro (2).png",
  24: "img/monitores/Monitor Gamer XPG 24 Full HD 120Hz.png",
  25: "img/monitores/Monitor Samsung 22 Essential S3 Flat 120 Hz Fhd 1920x1080 Color Negro (2).png",
  26: "img/monitores/Monitor Samsung 24' Odyssey G3 FHD 144Hz G30B (2).png",
  27: "img/monitores/Monitor Xiaomi A27qi.png"
};

// Cargar productos desde la API
document.addEventListener("DOMContentLoaded", async () => {
  const container = document.getElementById("productos-container");

  try {
    const res = await fetch("/api/productos");
    if (!res.ok) throw new Error("Error al conectar con el servidor");
    const productos = await res.json();

    // Filtrar solo monitores (id_categoria 1)
    const monitores = productos.filter(p => p.id_categoria === 1);

    if (!monitores.length) {
      container.innerHTML = '<p style="text-align:center;color:#aaa;">No se encontraron monitores.</p>';
      return;
    }

    container.innerHTML = "";
    productosLocales = monitores;

    monitores.forEach(producto => {
      const img = imagenesMonitores[producto.id_producto] || "img/placeholder.png";
      const card = document.createElement("div");
      card.classList.add("card-product");
      card.innerHTML = `
        <div class="container-img">
          <img src="${img}" alt="${producto.nombre_producto}" />
        </div>
        <div class="content-card-product">

          <h3>${producto.nombre_producto}</h3>
          <span class="add-cart"
            data-id="${producto.id_producto}"
            data-name="${producto.nombre_producto}"
            data-price="${producto.precio}"
            data-section="monitores">
            <i class="fa-solid fa-basket-shopping"></i>
          </span>
          <p class="price">$${Number(producto.precio).toLocaleString("es-AR")}</p>
          <button class="btn-read-more">Leer más</button>
          <ul class="more-info">
            ${(producto.descripcion || "Sin descripción").split("|").map(s => `<li>${s.trim()}</li>`).join("")}
            <li>Stock disponible: ${producto.stock} unidades</li>
          </ul>
        </div>
      `;
      container.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = `
      <p style="text-align:center;color:#e44;padding:1rem;">
        ⚠️ No se pudo conectar al servidor.<br>
        <small>Intentá nuevamente más tarde</small>
      </p>`;
  }
});
</script>

</body>
</html>
